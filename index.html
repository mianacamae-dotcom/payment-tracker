<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.app{max-width:1200px;margin:0 auto;padding:1.5rem 1rem;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.title{font-size:20px;font-weight:600;}
.btn{padding:7px 16px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn:hover{background:#f0f0ee;}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn.primary:hover{background:#333;}
.btn.danger{color:#dc2626;border-color:#fca5a5;}
.btn.danger:hover{background:#fee2e2;}
.btn.sm{padding:3px 10px;font-size:12px;}
.admin-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#f0f0ee;border-radius:8px;margin-bottom:1rem;flex-wrap:wrap;}
.admin-status{font-size:12px;color:#666;flex:1;}
.admin-status.on{color:#16a34a;font-weight:500;}
.company-nav{display:flex;gap:0;margin-bottom:1rem;border:1px solid #ddd;border-radius:12px;overflow:hidden;background:#fff;flex-wrap:wrap;}
.company-nav button{flex:1;min-width:80px;padding:9px 6px;font-size:12px;border:none;border-right:1px solid #eee;background:transparent;color:#666;cursor:pointer;font-family:inherit;}
.company-nav button:last-child{border-right:none;}
.company-nav button:hover{background:#f5f5f3;color:#1a1a1a;}
.company-nav button.active{background:#f0f0ee;color:#1a1a1a;font-weight:600;border-bottom:2px solid #1a1a1a;}
.view-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.view-tab{padding:6px 14px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-family:inherit;}
.view-tab.active{background:#f0f0ee;color:#1a1a1a;font-weight:600;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1rem;}
.metric{background:#fff;border-radius:10px;padding:.85rem 1rem;border:1px solid #eee;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;}
.metric-value{font-size:22px;font-weight:600;}
.metric-value.danger{color:#dc2626;}
.metric-value.warning{color:#d97706;}
.metric-value.success{color:#16a34a;}
.search-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.search-row input,.search-row select{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;}
.search-row input.wide{flex:1;min-width:180px;}
.search-row input.narrow{width:110px;}
.search-row select.narrow{width:130px;}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.sort-bar span{font-size:12px;color:#888;}
.sort-opt{padding:5px 12px;font-size:12px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-family:inherit;}
.sort-opt.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.week-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid #eee;border-radius:12px;background:#fff;cursor:pointer;margin-bottom:6px;}
.week-row:hover{background:#f5f5f3;}
.week-row.current{border-color:#d97706;}
.wpill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;min-width:64px;text-align:center;}
.wpill.past{background:#f0f0ee;color:#888;}
.wpill.now{background:#fef3c7;color:#d97706;}
.wpill.future{background:#dbeafe;color:#2563eb;}
.wpill.alert{background:#fee2e2;color:#dc2626;}
.wlabel{font-size:13px;flex:1;}
.wlabel small{font-size:11px;color:#888;margin-left:6px;}
.wcounts{display:flex;gap:5px;flex-wrap:wrap;}
.wc{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;}
.wc.paid{background:#dcfce7;color:#16a34a;}
.wc.pending{background:#fef3c7;color:#d97706;}
.wc.overdue{background:#fee2e2;color:#dc2626;}
.wtotal{font-size:13px;font-weight:600;min-width:80px;text-align:right;}
.table-wrap{overflow-x:auto;border:1px solid #eee;border-radius:12px;background:#fff;margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 12px;text-align:left;font-weight:600;color:#888;font-size:12px;border-bottom:1px solid #eee;background:#f9f9f7;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid #eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9f9f7;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;}
.badge.paid{background:#dcfce7;color:#16a34a;}
.badge.pending{background:#fef3c7;color:#d97706;}
.badge.overdue{background:#fee2e2;color:#dc2626;}
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;}
.supplier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:1rem;}
.supplier-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:.85rem 1rem;}
.supplier-name{font-size:13px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.supplier-amt{font-size:18px;font-weight:600;}
.supplier-meta{font-size:11px;color:#888;margin-top:2px;}
.section-label{font-size:12px;font-weight:600;color:#888;margin:1.25rem 0 .6rem;padding-bottom:5px;border-bottom:1px solid #eee;}
.empty{text-align:center;padding:3rem;color:#888;font-size:13px;}
.loading{text-align:center;padding:3rem;color:#888;font-size:13px;}
.status-popup{position:fixed;background:#fff;border:1px solid #ddd;border-radius:8px;padding:4px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.status-popup button{display:block;width:100%;padding:7px 14px;font-size:13px;border:none;border-radius:6px;background:transparent;cursor:pointer;text-align:left;font-family:inherit;}
.status-popup button:hover{background:#f5f5f3;}
.export-menu{position:relative;display:inline-block;}
.export-dropdown{display:none;position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #ddd;border-radius:8px;min-width:190px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.export-dropdown.open{display:block;}
.export-dropdown button{display:block;width:100%;text-align:left;padding:9px 14px;font-size:13px;border:none;background:transparent;color:#1a1a1a;cursor:pointer;border-bottom:1px solid #eee;font-family:inherit;}
.export-dropdown button:last-child{border-bottom:none;}
.export-dropdown button:hover{background:#f5f5f3;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1.25rem;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:11px;color:#2563eb;margin-top:4px;font-weight:500;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.status-picker{display:flex;gap:6px;flex-wrap:wrap;}
.spick{padding:5px 14px;font-size:12px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-family:inherit;}
.spick.active.paid{background:#dcfce7;color:#16a34a;border-color:#16a34a;}
.spick.active.pending{background:#fef3c7;color:#d97706;border-color:#d97706;}
.spick.active.overdue{background:#fee2e2;color:#dc2626;border-color:#dc2626;}
.ai-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.ai-box p{font-size:12px;color:#2563eb;margin-bottom:6px;}
.upload-area{border:1px dashed #bfdbfe;border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-size:12px;color:#666;background:#fff;}
.upload-area:hover{background:#eff6ff;}
.upload-area input{display:none;}
.ai-status{font-size:12px;color:#2563eb;margin-top:6px;min-height:18px;}
.import-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.import-overlay.open{display:flex;}
.import-modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.import-modal h3{font-size:16px;font-weight:600;margin-bottom:.5rem;}
.import-modal p{font-size:13px;color:#666;margin-bottom:1rem;}
.import-drop{border:2px dashed #ddd;border-radius:12px;padding:2.5rem;text-align:center;cursor:pointer;color:#888;font-size:13px;transition:all .2s;}
.import-drop:hover{border-color:#888;background:#f9f9f7;}
.import-drop input{display:none;}
.import-status{font-size:13px;color:#2563eb;margin:10px 0;min-height:20px;}
.import-preview{max-height:300px;overflow-y:auto;margin:10px 0;}
.import-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;}
.import-row:last-child{border-bottom:none;}
.rbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;background:#dbeafe;color:#2563eb;white-space:nowrap;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:600px){.field-row{grid-template-columns:1fr;}.search-row input.narrow,.search-row select.narrow{width:100%;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn" id="back-btn" style="display:none;" onclick="goBack()">← Back</button>
      <span class="title" id="page-title">Payment Tracker</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn" onclick="openImport()">Import Excel</button>
      <div class="export-menu" id="export-menu">
        <button class="btn" onclick="toggleExport()">Export ↓</button>
        <div class="export-dropdown" id="export-dropdown">
          <button onclick="doExport('current')">Export current view</button>
          <button onclick="doExport('all')">Export all payments</button>
        </div>
      </div>
      <button class="btn primary" onclick="openModal()">+ Add Payment</button>
    </div>
  </div>
  <div class="admin-bar">
    <span id="lock-icon">🔒</span>
    <span class="admin-status" id="admin-status">Admin locked — edit & delete disabled</span>
    <button class="btn sm" id="admin-btn" onclick="toggleAdmin()">Unlock</button>
  </div>
  <div class="company-nav" id="company-nav"></div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('weeks')">By week</button>
    <button class="view-tab" onclick="setView('months')">By month</button>
    <button class="view-tab" onclick="setView('suppliers')">By supplier</button>
    <button class="view-tab" onclick="setView('all')">All payments</button>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="search-row">
    <input class="wide" type="text" id="q" placeholder="Search supplier, invoice, company..." oninput="renderCurrent()">
    <input class="narrow" type="number" id="qamt" placeholder="Amount..." oninput="renderCurrent()">
    <input class="narrow" type="date" id="qdate" oninput="renderCurrent()">
    <select class="narrow" id="qweek" onchange="renderCurrent()"><option value="">All weeks</option></select>
    <select class="narrow" id="qstatus" onchange="renderCurrent()">
      <option value="">All statuses</option>
      <option value="paid">Paid</option>
      <option value="pending">Pending</option>
      <option value="overdue">Overdue</option>
    </select>
  </div>
  <div id="supplier-sort-bar" style="display:none;">
    <div class="sort-bar">
      <span>Sort suppliers by:</span>
      <button class="sort-opt active" id="sort-alpha" onclick="setSupSort('alpha')">A → Z</button>
      <button class="sort-opt" id="sort-date" onclick="setSupSort('date')">Date</button>
      <button class="sort-opt" id="sort-week" onclick="setSupSort('week')">Week</button>
    </div>
  </div>
  <div id="main"><div class="loading">Loading payments...</div></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalBg(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="import-overlay" id="import-overlay" onclick="closeImportBg(event)">
  <div class="import-modal">
    <h3>Import from Excel</h3>
    <p>Upload your weekly Excel file — AI will read all company tables and extract every payment automatically.</p>
    <div class="import-drop" onclick="document.getElementById('imp-file').click()">
      <input type="file" id="imp-file" accept=".xlsx,.xls" onchange="handleImport(this)">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">📊</div>
      <div id="imp-drop-label">Click to upload Excel file (.xlsx)</div>
    </div>
    <div class="import-status" id="imp-status"></div>
    <div class="import-preview" id="imp-preview"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;">
      <button class="btn" onclick="closeImport()">Close</button>
      <button class="btn primary" id="imp-confirm" style="display:none;" onclick="confirmImport()">Import all payments</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gxrmyiepbcimdwbgcgvp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cm15aWVwYmNpbWR3YmdjZ3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjE1NTUsImV4cCI6MjA5MjU5NzU1NX0.60Aryz_rsFZh7hDO9J3klouqF1av0tpycws_HhfxYIA';
const ADMIN_PASSWORD = '1304FS';
const MODEL = 'claude-haiku-4-5-20251001';
const COMPANIES = ['Vonston','Golden Mile','Época','BAIES','Winner Direction','Manjerico Palaciano'];
const COLORS = ['#7C3AED','#059669','#DC2626','#2563EB','#DB2777','#D97706'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const {createClient} = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const today = new Date(); today.setHours(0,0,0,0);
const ds = d => d.toISOString().split('T')[0];
const parseD = s => new Date(s+'T00:00:00');
const fmtD = d => d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const cc = n => COLORS[COMPANIES.indexOf(n) % COLORS.length] || '#888';
const euro = n => '€' + (parseFloat(n)||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});

function getMon(s){
  let d=parseD(s),day=d.getDay(),diff=day===0?-6:1-day,m=new Date(d);
  m.setDate(d.getDate()+diff);return m;
}
function getWk(d){
  let dt=new Date(d);dt.setHours(0,0,0,0);
  let j=new Date(dt.getFullYear(),0,1);
  return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);
}
function getMK(s){let d=parseD(s);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function fmtMK(k){let[y,m]=k.split('-');return MONTHS[parseInt(m)-1]+' '+y;}

let payments=[],editId=null,pendingFile=null,importedRows=[];
let activeCompany='All',activeView='weeks',drillKey=null,isAdmin=false,supSort='alpha';

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

async function callClaude(body){
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error)throw new Error(JSON.stringify(data.error));
  return data;
}

async function loadPayments(){
  const {data,error}=await db.from('payments').select('*').order('due_date',{ascending:true});
  if(error){console.error(error);toast('Error loading');return;}
  payments=data.map(p=>({
    id:p.id,company:p.company||'',invoice:p.invoice||'',
    supplier:p.supplier||'',amount:parseFloat(p.amount)||0,
    issueDate:p.issue_date||'',due:p.due_date||'',
    status:p.status||'pending',notes:p.notes||'',
    fileName:p.invoice_file_name||''
  }));
  buildWkOpts();renderNav();renderCurrent();
}

async function dbSave(p,id){
  const row={
    company:p.company,invoice:p.invoice,supplier:p.supplier,
    amount:p.amount,issue_date:p.issueDate||null,
    due_date:p.due,status:p.status,notes:p.notes,
    invoice_file_name:p.fileName||''
  };
  if(id){const{error}=await db.from('payments').update(row).eq('id',id);return!error;}
  else{const{error}=await db.from('payments').insert(row);return!error;}
}

async function dbDelete(id){
  const{error}=await db.from('payments').delete().eq('id',id);return!error;
}

async function dbStatus(id,status){
  const{error}=await db.from('payments').update({status}).eq('id',id);
  if(!error){const p=payments.find(x=>x.id===id);if(p)p.status=status;renderCurrent();toast('Status updated');}
}

function src(){
  let s=activeCompany==='All'?[...payments]:payments.filter(p=>p.company===activeCompany);
  const q=(document.getElementById('q')||{}).value||'';
  const qa=(document.getElementById('qamt')||{}).value||'';
  const qd=(document.getElementById('qdate')||{}).value||'';
  const qw=(document.getElementById('qweek')||{}).value||'';
  const qs=(document.getElementById('qstatus')||{}).value||'';
  if(q)s=s.filter(p=>[p.invoice,p.supplier,p.company].some(v=>v.toLowerCase().includes(q.toLowerCase())));
  if(qa)s=s.filter(p=>String(p.amount).includes(qa));
  if(qd)s=s.filter(p=>p.due===qd||p.issueDate===qd);
  if(qw)s=s.filter(p=>p.due&&ds(getMon(p.due))===qw);
  if(qs)s=s.filter(p=>p.status===qs);
  return s;
}

function buildWkOpts(){
  const map={};
  payments.forEach(p=>{if(!p.due)return;try{const m=getMon(p.due),k=ds(m);map[k]={wk:getWk(m),mon:m};}catch(e){}});
  const sel=document.getElementById('qweek');
  const cur=sel.value;
  sel.innerHTML='<option value="">All weeks</option>'+
    Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>
      '<option value="'+k+'">Week '+v.wk+' — '+fmtD(v.mon)+'</option>').join('');
  sel.value=cur;
}

function wkGroups(list){
  const g={};
  list.forEach(p=>{
    if(!p.due)return;
    try{const m=getMon(p.due),k=ds(m);
    if(!g[k])g[k]={mon:m,wk:getWk(m),payments:[]};
    g[k].payments.push(p);}catch(e){}
  });
  return g;
}

function mGroups(list){
  const g={};
  list.forEach(p=>{if(!p.due)return;const k=getMK(p.due);if(!g[k])g[k]={payments:[]};g[k].payments.push(p);});
  return g;
}

const thisMon=getMon(ds(today));
function pillCls(mon,pmts){
  if(!mon||isNaN(mon.getTime()))return 'past';
  const ip=mon<thisMon,ic=ds(mon)===ds(thisMon);
  if(ic)return 'now';
  if(ip&&pmts&&pmts.some(p=>p.status==='overdue'))return 'alert';
  if(ip)return 'past';
  return 'future';
}

function renderNav(){
  document.getElementById('company-nav').innerHTML=
    ['All',...COMPANIES].map(c=>{
      const dot=c!=='All'?'<span class="cdot" style="background:'+cc(c)+'"></span>':'';
      return '<button class="'+(activeCompany===c?'active':'')+'" onclick="setCompany(\''+c.replace(/'/g,"\\'")+'\')">'+ dot+c+'</button>';
    }).join('');
}

function setCompany(c){activeCompany=c;drillKey=null;document.getElementById('back-btn').style.display='none';document.getElementById('page-title').textContent='Payment Tracker';renderCurrent();}

function setView(v){
  activeView=v;drillKey=null;
  document.getElementById('back-btn').style.display='none';
  document.getElementById('page-title').textContent='Payment Tracker';
  document.querySelectorAll('.view-tab').forEach((b,i)=>b.classList.toggle('active',['weeks','months','suppliers','all'][i]===v));
  document.getElementById('supplier-sort-bar').style.display=v==='suppliers'?'block':'none';
  renderCurrent();
}

function setSupSort(s){
  supSort=s;
  ['alpha','date','week'].forEach(k=>{const el=document.getElementById('sort-'+k);if(el)el.classList.toggle('active',k===s);});
  renderSuppliers();
}

function renderMetrics(list){
  const total=list.reduce((s,p)=>s+p.amount,0);
  const ov=list.filter(p=>p.status==='overdue').reduce((s,p)=>s+p.amount,0);
  const pe=list.filter(p=>p.status==='pending').reduce((s,p)=>s+p.amount,0);
  const pa=list.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
  document.getElementById('metrics').innerHTML=
    '<div class="metric"><div class="metric-label">Total</div><div class="metric-value">'+euro(total)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Overdue</div><div class="metric-value danger">'+euro(ov)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Pending</div><div class="metric-value warning">'+euro(pe)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Paid</div><div class="metric-value success">'+euro(pa)+'</div></div>';
}

function renderCurrent(){
  renderNav();buildWkOpts();
  const list=src();renderMetrics(list);
  if(drillKey){renderDrill(list);return;}
  document.getElementById('supplier-sort-bar').style.display=activeView==='suppliers'?'block':'none';
  if(activeView==='weeks')renderWeeks(list);
  else if(activeView==='months')renderMonths(list);
  else if(activeView==='suppliers')renderSuppliers(list);
  else renderTable(list);
}

function renderDrill(list){
  const g=activeView==='weeks'?wkGroups(list)[drillKey]:mGroups(list)[drillKey];
  if(!g){goBack();return;}
  renderTable(g.payments);
  renderSupBreakdown(g.payments,activeView==='weeks'?'Supplier totals this week':'Supplier totals this month');
}

function renderWeeks(list){
  const g=wkGroups(list);
  const keys=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){document.getElementById('main').innerHTML='<div class="empty">No payments found.</div>';return;}
  document.getElementById('main').innerHTML=keys.map(k=>{
    const{mon,wk,payments:ps}=g[k];
    const pc=pillCls(mon,ps);
    const total=ps.reduce((s,p)=>s+p.amount,0);
    const paid=ps.filter(p=>p.status==='paid').length;
    const pend=ps.filter(p=>p.status==='pending').length;
    const over=ps.filter(p=>p.status==='overdue').length;
    return '<div class="week-row'+(pc==='now'?' current':'')+'" onclick="drillWeek(\''+k+'\')">'+
      '<span class="wpill '+pc+'">Wk '+wk+(pc==='now'?' ★':'')+'</span>'+
      '<div class="wlabel">'+fmtD(mon)+'<small>'+ps.length+' payment'+(ps.length!==1?'s':'')+'</small></div>'+
      '<div class="wcounts">'+
      (paid?'<span class="wc paid">'+paid+' paid</span>':'')+
      (pend?'<span class="wc pending">'+pend+' pending</span>':'')+
      (over?'<span class="wc overdue">'+over+' overdue</span>':'')+
      '</div>'+
      '<div class="wtotal">'+euro(total)+'</div>'+
      '<span style="color:#ccc;font-size:18px;">›</span></div>';
  }).join('');
}

function renderMonths(list){
  const g=mGroups(list);
  const keys=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){document.getElementById('main').innerHTML='<div class="empty">No payments found.</div>';return;}
  document.getElementById('main').innerHTML=keys.map(k=>{
    const{payments:ps}=g[k];
    const total=ps.reduce((s,p)=>s+p.amount,0);
    const paid=ps.filter(p=>p.status==='paid').length;
    const pend=ps.filter(p=>p.status==='pending').length;
    const over=ps.filter(p=>p.status==='overdue').length;
    const[y,m]=k.split('-');
    const md=new Date(parseInt(y),parseInt(m)-1,1);
    const nd=new Date(today.getFullYear(),today.getMonth(),1);
    const pc=md<nd?'past':md.getTime()===nd.getTime()?'now':'future';
    return '<div class="week-row'+(pc==='now'?' current':'')+'" onclick="drillMonth(\''+k+'\')">'+
      '<span class="wpill '+pc+'">'+fmtMK(k)+'</span>'+
      '<div class="wlabel" style="flex:1;"></div>'+
      '<div class="wcounts">'+
      (paid?'<span class="wc paid">'+paid+' paid</span>':'')+
      (pend?'<span class="wc pending">'+pend+' pending</span>':'')+
      (over?'<span class="wc overdue">'+over+' overdue</span>':'')+
      '</div>'+
      '<div class="wtotal">'+euro(total)+'</div>'+
      '<span style="color:#ccc;font-size:18px;">›</span></div>';
  }).join('');
}

function renderSuppliers(list){
  if(!list)list=src();
  const map={};
  list.forEach(p=>{
    if(!map[p.supplier])map[p.supplier]={total:0,count:0,paid:0,lateDue:'',lateWk:0};
    map[p.supplier].total+=p.amount;map[p.supplier].count++;
    if(p.status==='paid')map[p.supplier].paid+=p.amount;
    if(p.due>map[p.supplier].lateDue)map[p.supplier].lateDue=p.due;
    if(p.due){try{const wk=getWk(getMon(p.due));if(wk>map[p.supplier].lateWk)map[p.supplier].lateWk=wk;}catch(e){}}
  });
  let sorted=Object.entries(map);
  if(supSort==='alpha')sorted.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(supSort==='date')sorted.sort((a,b)=>b[1].lateDue.localeCompare(a[1].lateDue));
  else sorted.sort((a,b)=>b[1].lateWk-a[1].lateWk);
  const allWks=[...new Set(list.filter(p=>p.due).map(p=>{try{return ds(getMon(p.due));}catch(e){return null;}})).values()].filter(Boolean).sort();
  const allMos=[...new Set(list.filter(p=>p.due).map(p=>getMK(p.due))).values()].sort();
  const wkMap={},moMap={};
  list.forEach(p=>{
    if(!p.due)return;
    try{const wk=ds(getMon(p.due)),mo=getMK(p.due);
    if(!wkMap[p.supplier])wkMap[p.supplier]={};wkMap[p.supplier][wk]=(wkMap[p.supplier][wk]||0)+p.amount;
    if(!moMap[p.supplier])moMap[p.supplier]={};moMap[p.supplier][mo]=(moMap[p.supplier][mo]||0)+p.amount;}catch(e){}
  });
  if(!sorted.length){document.getElementById('main').innerHTML='<div class="empty">No suppliers found.</div>';return;}
  document.getElementById('main').innerHTML=
    '<div class="supplier-grid">'+sorted.map(([n,d])=>
      '<div class="supplier-card"><div class="supplier-name">'+n+'</div><div class="supplier-amt">'+euro(d.total)+'</div>'+
      '<div class="supplier-meta">'+d.count+' payment'+(d.count!==1?'s':'')+' · '+euro(d.paid)+' paid</div></div>').join('')+'</div>'+
    '<div class="section-label">Weekly breakdown</div>'+
    '<div class="table-wrap"><table><thead><tr><th>Supplier</th>'+allWks.map(k=>'<th style="text-align:right">Wk '+getWk(parseD(k))+'</th>').join('')+'<th style="text-align:right">Total</th></tr></thead>'+
    '<tbody>'+sorted.map(([n])=>'<tr><td>'+n+'</td>'+allWks.map(w=>'<td style="text-align:right">'+(wkMap[n]&&wkMap[n][w]?euro(wkMap[n][w]):'-')+'</td>').join('')+'<td style="text-align:right;font-weight:600">'+euro(map[n].total)+'</td></tr>').join('')+'</tbody></table></div>'+
    '<div class="section-label">Monthly breakdown</div>'+
    '<div class="table-wrap"><table><thead><tr><th>Supplier</th>'+allMos.map(k=>'<th style="text-align:right">'+fmtMK(k)+'</th>').join('')+'<th style="text-align:right">Total</th></tr></thead>'+
    '<tbody>'+sorted.map(([n])=>'<tr><td>'+n+'</td>'+allMos.map(m=>'<td style="text-align:right">'+(moMap[n]&&moMap[n][m]?euro(moMap[n][m]):'-')+'</td>').join('')+'<td style="text-align:right;font-weight:600">'+euro(map[n].total)+'</td></tr>').join('')+'</tbody></table></div>';
}

function renderSupBreakdown(list,label){
  const map={};
  list.forEach(p=>{if(!map[p.supplier])map[p.supplier]={total:0,count:0};map[p.supplier].total+=p.amount;map[p.supplier].count++;});
  const sorted=Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('main').innerHTML+='<div class="section-label">'+label+'</div>'+
    '<div class="supplier-grid">'+sorted.map(([n,d])=>
      '<div class="supplier-card"><div class="supplier-name">'+n+'</div><div class="supplier-amt">'+euro(d.total)+'</div><div class="supplier-meta">'+d.count+' payment'+(d.count!==1?'s':'')+'</div></div>').join('')+'</div>';
}

function showStatusMenu(e,id){
  e.stopPropagation();
  document.querySelectorAll('.status-popup').forEach(el=>el.remove());
  const p=document.createElement('div');p.className='status-popup';
  p.style.cssText='top:'+e.clientY+'px;left:'+(e.clientX-60)+'px;';
  ['paid','pending','overdue'].forEach(s=>{
    const b=document.createElement('button');
    b.textContent=s.charAt(0).toUpperCase()+s.slice(1);
    b.onclick=ev=>{ev.stopPropagation();dbStatus(id,s);p.remove();};
    p.appendChild(b);
  });
  document.body.appendChild(p);
  setTimeout(()=>document.addEventListener('click',()=>p.remove(),{once:true}),10);
}

async function handleInvoice(input){
  const file=input.files[0];if(!file)return;
  pendingFile={file,name:file.name};
  const st=document.getElementById('ai-status');
  st.textContent='Reading invoice with AI...';
  try{
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result.split(',')[1]);
      r.onerror=()=>rej(new Error('read error'));
      r.readAsDataURL(file);
    });
    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const mediaType=isPDF?'application/pdf':(file.type||'image/jpeg');
    const body={
      model:MODEL,max_tokens:500,
      messages:[{role:'user',content:[
        isPDF
          ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
          :{type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
        {type:'text',text:'Extract from this invoice. Return ONLY valid JSON, nothing else: {"supplier":"","invoice_number":"","amount":0,"issue_date":"YYYY-MM-DD","due_date":"YYYY-MM-DD"}. Use empty string or 0 if field not found. Dates in YYYY-MM-DD format.'}
      ]}]
    };
    const data=await callClaude(body);
    const text=data.content[0].text;
    const match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('no json');
    const inv=JSON.parse(match[0]);
    if(inv.supplier&&document.getElementById('f-sup'))document.getElementById('f-sup').value=inv.supplier;
    if(inv.invoice_number&&document.getElementById('f-inv'))document.getElementById('f-inv').value=inv.invoice_number;
    if(inv.amount&&document.getElementById('f-amt'))document.getElementById('f-amt').value=inv.amount;
    if(inv.issue_date&&document.getElementById('f-iss'))document.getElementById('f-iss').value=inv.issue_date;
    if(inv.due_date&&document.getElementById('f-due')){document.getElementById('f-due').value=inv.due_date;updateHint();}
    st.textContent='✅ Invoice read successfully!';
  }catch(err){
    console.error(err);
    st.textContent='Could not read automatically — please fill manually.';
  }
}

async function savePayment(){
  const co=document.getElementById('f-co').value;
  const due=document.getElementById('f-due').value;
  if(!co||!due){toast('Please fill Company and Due Date');return;}
  const p={
    company:co,invoice:document.getElementById('f-inv').value||('INV-'+Date.now()),
    supplier:document.getElementById('f-sup').value||'—',
    amount:parseFloat(document.getElementById('f-amt').value)||0,
    issueDate:document.getElementById('f-iss').value||'',due:due,
    status:document.getElementById('f-st').value,
    notes:document.getElementById('f-notes').value,
    invoiceLink:document.getElementById('f-link')?.value||'',
    fileName:pendingFile?pendingFile.name:(editId?payments.find(x=>x.id===editId)?.fileName||'':'')
  };
  const ok=await dbSave(p,editId);
  if(ok){closeModal();toast(editId?'Payment updated!':'Payment added!');await loadPayments();}
  else toast('Error saving — please try again');
}

async function delPayment(id){
  if(!isAdmin){toast('Admin access required');return;}
  if(!confirm('Delete this payment? This cannot be undone.'))return;
  const ok=await dbDelete(id);
  if(ok){toast('Payment deleted');await loadPayments();}
  else toast('Error deleting');
}

function doExport(mode){
  document.getElementById('export-dropdown').classList.remove('open');
  let list;
  if(mode==='current'){
    if(drillKey){const g=activeView==='weeks'?wkGroups(src())[drillKey]:mGroups(src())[drillKey];list=g?g.payments:src();}
    else list=src();
  }else list=payments;
  const rows=[['Supplier','Amount','Issue Date','Due Date','Week','Status','Invoice #','Company','Notes']];
  list.forEach(p=>{
    const wn=p.due?getWk(getMon(p.due)):'';
    rows.push([p.supplier,p.amount,p.issueDate||'',p.due||'',wn,p.status,p.invoice,p.company,p.notes||'']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='payments_'+mode+'.csv';a.click();
}

async function handleImport(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('imp-drop-label').textContent=file.name;
  document.getElementById('imp-status').textContent='Reading Excel file...';
  document.getElementById('imp-confirm').style.display='none';
  document.getElementById('imp-preview').innerHTML='';
  try{
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array',cellDates:true});
    let text='';
    wb.SheetNames.forEach(n=>{
      const csv=XLSX.utils.sheet_to_csv(wb.Sheets[n]);
      if(csv.trim())text+='\n\n=== Sheet: '+n+' ===\n'+csv;
    });
    document.getElementById('imp-status').textContent='AI is reading the data...';
    const prompt='Extract ALL payment rows from this Portuguese company Excel CSV. Companies: Vonston, Golden Mile, Época, BAIES, Winner Direction, Manjerico Palaciano.\nReturn ONLY a JSON array, no markdown:\n[{"company":"Vonston","supplier":"EDP","amount":196.23,"invoice":"FT2026","issue_date":"2026-03-03","due_date":"2026-03-24","status":"pending"}]\nRules: Not paid or blank=pending, Paid=paid. Portuguese months to YYYY-MM-DD. Skip empty/total/header rows.\nData:\n'+text.substring(0,12000);
    const data=await callClaude({model:MODEL,max_tokens:4000,messages:[{role:'user',content:prompt}]});
    const txt=data.content[0].text;
    const match=txt.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('No JSON array found');
    importedRows=JSON.parse(match[0]);
    document.getElementById('imp-status').textContent='Found '+importedRows.length+' payments — review and confirm:';
    document.getElementById('imp-preview').innerHTML=importedRows.map(p=>
      '<div class="import-row"><span class="rbadge">'+p.company+'</span>'+
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;">'+p.supplier+'</span>'+
      '<span style="font-weight:600;">'+euro(p.amount)+'</span>'+
      '<span style="color:#888;font-size:11px;">'+(p.due_date||'no date')+'</span></div>').join('');
    document.getElementById('imp-confirm').style.display='inline-block';
  }catch(err){
    console.error(err);
    document.getElementById('imp-status').textContent='Could not read file. Please try again.';
  }
}

async function confirmImport(){
  const btn=document.getElementById('imp-confirm');
  btn.textContent='Importing...';btn.disabled=true;
  let ok=0,fail=0;
  for(const p of importedRows){
    const row={
      company:p.company||'Vonston',invoice:p.invoice||('IMP-'+Date.now()),
      supplier:p.supplier||'—',amount:parseFloat(p.amount)||0,
      issue_date:p.issue_date||null,due_date:p.due_date||ds(today),
      status:p.status||'pending',notes:'',invoice_file_name:''
    };
    const{error}=await db.from('payments').insert(row);
    if(error)fail++;else ok++;
  }
  closeImport();
  toast('Imported '+ok+' payments!'+(fail>0?' ('+fail+' failed)':''));
  await loadPayments();
}

loadPayments();
</script>
</body>
</html>
